name: Docker Image CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths-ignore:
      - "README.md"
      - ".gitignore"
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_BUILDKIT: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch git tags
        run: |
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --force --prune --tags --unshallow origin
          else
            git fetch --force --prune --tags origin
          fi

      - name: Verify git tags
        run: git describe --tags --abbrev=0

      - name: Prepare image metadata
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          REF_TYPE="${GITHUB_REF_TYPE:-branch}"
          REF_NAME="${GITHUB_REF_NAME:-main}"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
          elif [ "$REF_TYPE" = "tag" ]; then
            TAG="$REF_NAME"
          elif [ "$REF_NAME" = "main" ]; then
            TAG="latest"
          else
            TAG="$(printf '%s' "$REF_NAME" | tr '[:upper:]/' '[:lower:]-' | sed 's/[^a-z0-9_.-]/-/g')"
          fi

          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE}:${TAG}" >> "$GITHUB_ENV"
          echo "SHA_TAG=${IMAGE}:sha-${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg "BUILT_BY=${GITHUB_ACTOR:-github}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -t "${IMAGE_TAG}" \
            -t "${SHA_TAG}" \
            .
          docker image inspect "${IMAGE_TAG}" --format 'Built image {{.Id}} for revision {{index .Config.Labels "org.opencontainers.image.revision"}}'

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker push "${IMAGE_TAG}"
          docker push "${SHA_TAG}"
